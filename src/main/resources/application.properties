spring.application.name=ecommerce

# Default to a fast local profile for quicker iteration.
spring.profiles.default=dev-fast
spring.profiles.group.portfolio=postgres,observability
spring.profiles.group.dev-mail-sandbox=dev-fast,mail-sandbox

# Keep logs concise while preserving startup timing data.
logging.level.org.springframework=INFO

# Email verification flow defaults.
app.email.enabled=false
app.email.from=no-reply@ecommerce.local
