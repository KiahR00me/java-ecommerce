spring.application.name=ecommerce

# Default to a fast local profile for quicker iteration.
spring.profiles.default=dev-fast
spring.profiles.group.portfolio=postgres,observability
spring.profiles.group.dev-mail-sandbox=dev-fast,mail-sandbox

# Keep logs concise while preserving startup timing data.
logging.level.org.springframework=INFO

# Limit error payload detail exposed over HTTP responses.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Compress JSON and static responses to reduce payload size in dev/prod.
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript

# Email verification flow defaults.
app.email.enabled=false
app.email.from=no-reply@ecommerce.local

# Cursor snapshot token controls.
app.pagination.snapshot.version=v1
app.pagination.snapshot.ttl-seconds=300

# Security credentials and token settings (environment-driven).
app.security.admin-username=${APP_SECURITY_ADMIN_USERNAME}
app.security.admin-password=${APP_SECURITY_ADMIN_PASSWORD}
app.security.customer-username=${APP_SECURITY_CUSTOMER_USERNAME}
app.security.customer-password=${APP_SECURITY_CUSTOMER_PASSWORD}
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt-ttl-seconds=${APP_SECURITY_JWT_TTL_SECONDS:900}

# Request rate limiting defaults.
app.security.rate-limit.login-per-minute=${APP_SECURITY_RATE_LIMIT_LOGIN_PER_MINUTE:10}
app.security.rate-limit.write-per-minute=${APP_SECURITY_RATE_LIMIT_WRITE_PER_MINUTE:120}

# Login attempt throttling defaults.
app.security.login-throttle.max-failures=${APP_SECURITY_LOGIN_MAX_FAILURES:5}
app.security.login-throttle.failure-window-seconds=${APP_SECURITY_LOGIN_FAILURE_WINDOW_SECONDS:300}
app.security.login-throttle.block-duration-seconds=${APP_SECURITY_LOGIN_BLOCK_DURATION_SECONDS:600}
