# Fast local profile: in-memory DB and minimal DB init overhead.
spring.datasource.url=jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
app.seed.dev-fast.enabled=true
spring.main.lazy-initialization=true
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Local-only security defaults so `./gradlew bootRun` works without manual env setup.
app.security.admin-username=${APP_SECURITY_ADMIN_USERNAME:admin}
app.security.admin-password=${APP_SECURITY_ADMIN_PASSWORD:change-me-admin}
app.security.customer-username=${APP_SECURITY_CUSTOMER_USERNAME:customer@example.com}
app.security.customer-password=${APP_SECURITY_CUSTOMER_PASSWORD:change-me-customer}
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET:replace-with-a-strong-32-char-minimum-secret}
app.security.jwt-ttl-seconds=${APP_SECURITY_JWT_TTL_SECONDS:900}
