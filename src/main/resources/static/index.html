<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ecommerce API</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f4f8fb;
      color: #102a43;
    }
    main {
      max-width: 760px;
      margin: 56px auto;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(16, 42, 67, 0.08);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.9rem;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.5;
    }
    ul {
      padding-left: 20px;
      margin-top: 10px;
    }
    code {
      background: #eef3f8;
      border-radius: 6px;
      padding: 2px 6px;
    }
    a {
      color: #1f6feb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ecommerce API</h1>
    <p>This backend serves API endpoints for the ecommerce platform.</p>
    <p>For the frontend app, use your Vite dev server URL (for example <code>http://localhost:5173</code>).</p>
    <ul>
      <li>Health check: <a href="/actuator/health">/actuator/health</a></li>
      <li>API landing JSON: <a href="/api">/api</a></li>
      <li>Products cursor endpoint: <a href="/api/products/cursor?limit=1&sortBy=NEWEST&sortDirection=DESC">/api/products/cursor</a></li>
    </ul>
  </main>
</body>
</html>
