spring.datasource.url=jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.main.lazy-initialization=true
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
app.seed.dev-fast.enabled=true

app.security.admin-username=admin
app.security.admin-password=admin123
app.security.customer-username=customer@example.com
app.security.customer-password=customer123
app.security.jwt-secret=dev-fast-test-secret-key-with-32-plus-characters
app.security.jwt-ttl-seconds=900
app.security.rate-limit.login-per-minute=60
app.security.rate-limit.write-per-minute=600
app.security.login-throttle.max-failures=20
app.security.login-throttle.failure-window-seconds=300
app.security.login-throttle.block-duration-seconds=60
